<!DOCTYPE html>
<html lang="zh-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PMR 调研 V3 · Tier1 $500k-$1M</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b0f;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.5;padding:0;min-height:100vh}
.header{background:linear-gradient(135deg,#111827,#0d1321);padding:18px 14px 14px;border-bottom:1px solid #1e2635;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:1.1em;font-weight:700;color:#fff}
.header .sub{font-size:.68em;color:#6b7b8d;margin-top:3px}
.container{padding:10px;max-width:640px;margin:0 auto}
.card{background:#141922;border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid #232d3d}
.card-top{display:flex;align-items:center;padding:12px 12px 4px;gap:8px}
.badge{font-weight:800;font-size:.68em;padding:3px 8px;border-radius:16px;color:#fff;flex-shrink:0;white-space:nowrap}
.badge.gold{background:linear-gradient(135deg,#f59e0b,#d97706)}
.badge.silver{background:linear-gradient(135deg,#94a3b8,#4b5563)}
.badge.bronze{background:linear-gradient(135deg,#b45309,#92400e)}
.badge.normal{background:#3b4a5c}
.badge.hot{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.badge.unrated{background:#444}
.ctitle{font-size:.9em;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clink{display:flex;align-items:center;background:#1d4ed8;color:#fff;font-size:.65em;padding:3px 8px;border-radius:6px;text-decoration:none;flex-shrink:0}
.cprice{padding:2px 12px 6px;font-size:.82em;color:#60a5fa;font-weight:600}
.pbar{display:flex;align-items:center;padding:0 12px 6px;gap:6px}
.pbar .lbl{font-size:.6em;color:#6b7b8d;flex-shrink:0}
.pbar .track{flex:1;height:6px;background:#1e2635;border-radius:3px;overflow:hidden}
.pbar .fill{height:100%;border-radius:3px}
.pbar .fill.high{background:#10b981}
.pbar .fill.med{background:#f59e0b}
.pbar .fill.low{background:#ef4444}
.pbar .val{font-size:.6em;color:#6b7b8d;flex-shrink:0;min-width:26px;text-align:right}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px 6px}
.mc{background:#0e1117;border-radius:7px;padding:8px 4px;text-align:center}
.mc .v{font-size:.9em;font-weight:700;color:#fff}
.mc .vg{color:#34d399}.mc .vy{color:#fbbf24}.mc .vr{color:#f87171}.mc .vb{color:#60a5fa}.mc .vn{color:#4b5563;font-style:italic}
.mc .l{font-size:.56em;color:#6b7b8d;margin-top:1px;text-transform:uppercase;letter-spacing:.1px}
.rrow{padding:2px 12px 4px}
.rrow .st{color:#fbbf24;font-size:.85em}
.rrow .sr{font-size:.75em;color:#60a5fa;font-weight:600;margin-left:4px}
.rbase{font-size:.7em;color:#9ca3af;background:#0e1117;padding:5px 7px;border-radius:6px;margin:3px 12px 4px;border-left:3px solid #f59e0b}
.gaps-d{padding:0 12px}
.gaps-d summary{font-size:.68em;color:#f87171;cursor:pointer;padding:3px 0}
.gaps-d ul{font-size:.64em;color:#9ca3af;padding:2px 0 6px 12px;margin:0}
.gaps-d li{margin:2px 0;line-height:1.3}
.act{padding:0 12px 10px}
.act-box{font-size:.68em;color:#c9d1d9;background:rgba(37,99,235,.12);border-left:3px solid #2563eb;padding:5px 7px;border-radius:0 5px 5px 0}
.act-box b{color:#60a5fa}
.stitle{font-size:.82em;font-weight:700;color:#fff;padding:16px 4px 6px;border-bottom:1px solid #232d3d;margin-bottom:10px;margin-top:16px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.ct{width:100%;min-width:600px;border-collapse:collapse;font-size:.64em}
.ct th{background:#1a1f2e;padding:6px 3px;text-align:center;font-weight:600;color:#6b7b8d;border-bottom:1px solid #232d3d}
.ct th:first-child{text-align:left;min-width:80px}
.ct td{padding:5px 3px;text-align:center;border-bottom:1px solid #1a1f2e}
.ct td:first-child{text-align:left;font-weight:600;color:#c9d1d9}
.ct tr:hover td{background:#1a1f2e}
.tg{color:#34d399}.ty{color:#fbbf24}.tr{color:#f87171}.tb{color:#60a5fa}.tn{color:#4b5563;font-style:italic}
.footer{text-align:center;padding:16px 8px 20px;color:#4b5563;font-size:.65em}
.footer a{color:#60a5fa}
</style>
</head>
<body>
<div class="header">
<h1>📊 Brisbane PMR 调研 V3</h1>
<div class="sub">第一档 · $500k–$1M · Business Only · 2026-03-31</div>
<div class="sub">JSON同步 · 数据完整度可见 · 评分有据</div>
</div>
<div class="container">
<div id="cards"></div>
<div class="stitle">📋 横向对比表（核心数字）</div>
<div class="tw">
<table class="ct" id="ct">
<thead><tr>
<th>物业</th><th>要价 AUD</th><th>年净收入</th><th>倍数</th><th>合同剩余</th><th>BC薪资</th><th>Pool</th><th>评分</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div class="footer">
<p>JSON数据: <code>pmr-data-v3.json</code> · 9标准字段</p>
<p>Accom Properties · TheOnsiteManager · ResortBrokers</p>
<p>OpenClaw · 2026-03-31</p>
</div>
</div>
<script>
var P=[
{id:"KP-001",name:"Silver Quays",loc:"Kangaroo Point",price:691155,ni:138231,mult:5.0,cyr:null,bc:129395,pool:5,onsite:false,pb:false,rating:3.6,
 basis:"BC薪资占净利93.6%极稳定；但Letting Pool仅5/49=10.2%，增值空间受限。回报率~20%合理",
 gaps:["合同年限: Listing未披露","楼龄: 未知","3年财报: 需向卖方索取","长租/短租比: 需查letting records"],
 url:"https://accomproperties.com.au/business-display/business-kangaroo-point,19211",
 action:"联系Resort Brokers获取合同年限和Pool增长历史"},
{id:"BC-001",name:"Brisbane City MR",loc:"Brisbane City",price:608000,ni:null,mult:null,cyr:null,bc:null,pool:null,onsite:false,pb:false,rating:3.0,
 basis:"门槛$608K最低, Spare Time管理灵活; 但净收入/BC/Pool全未披露, 信息严重不足",
 gaps:["年净收入: 经纪人未披露, 需3年财报","BC薪资: 未知","合同年限: 需Agreement","Pool: 未知","总套数: 未知","楼龄: 未知"],
 url:"https://accomproperties.com.au/business-display/business-brisbane-city,19124",
 action:"向经纪人索取完整信息包(3年财报/合同/Pool明细)"},
{id:"BW-001",name:"The Gap Townhouse",loc:"The Gap (Inner West)",price:790000,ni:128133,mult:6.17,cyr:23,bc:78819,pool:14,onsite:false,pb:false,rating:4.0,
 basis:"25年合同剩23年极安全; BC薪资随CPI递增; Pool 13+1 另有12外部单元可收回增长大; 但倍数6.17x偏高",
 gaps:["楼龄: 未知","总套数: 未知(无法算Pool占比)","外部12单元收回: 非保证, 需确认"],
 url:"https://accomproperties.com.au/business-display/business-the-gap,19190",
 action:"核实外部12单元收回概率; 获取总套数算占比"},
{id:"TF-001",name:"Teneriffe Blue-Chip",loc:"Teneriffe",price:1356768,ni:null,mult:null,cyr:null,bc:null,pool:null,onsite:false,pb:false,rating:2.8,
 basis:"地段极优(CBD近+Riverwalk); 但$1.36M超第一档, 且收入/BC/合同全无披露, 信息严重不足. 仅基于地段给分",
 gaps:["年净收入: 完全未披露","BC薪资: 未知","合同条款/年限: 未知","Pool: 未知","总套数: 未知","Office Hours: 未知"],
 url:"https://accomproperties.com.au/business-display/business-teneriffe,19064",
 action:"向ResortBrokers要完整披露包, 决定是否继续尽调"},
{id:"WE-001",name:"West End MR",loc:"West End",price:750000,ni:125078,mult:5.99,cyr:null,bc:76478,pool:null,onsite:false,pb:false,rating:3.8,
 basis:"BC $76K占净利~61%+CPI递增; 倍数5.99x略高但可接受; 楼龄新(推测2018-2021)降低维护. 主要风险Pool数据缺失",
 gaps:["Pool: Listing未提及","总套数: 未知","合同年限: 未知","楼龄: 仅推断2018-2021, 需核实","长短租: 未知"],
 url:"https://accomproperties.com.au/business-display/business-west-end,19008",
 action:"索取Pool明细+合同年限+楼龄确认"},
{id:"CH-001",name:"Chermside/Lutwyche",loc:"Chermside & Lutwyche(~4km)",price:652000,ni:null,mult:null,cyr:null,bc:90000,pool:null,onsite:false,pb:false,rating:3.5,
 basis:"BC $90K+占净利~70%(推测净利~$130K); 双栋极简设施; $652K门槛; 但净利未官方披露, 需财报验证",
 gaps:["年净收入: 未官方披露(网传$178K非确认)","倍数: 不可计算","合同年限: 仅长期","Pool: 未知","总套数: 未知","楼龄: 仅知modern"],
 url:"https://theonsitemanager.com.au/",
 action:"联系Accom/TheOnsiteManager获取完整信息表"},
{id:"BC-002",name:"Brisbane City Tender",loc:"Brisbane City",price:null,ni:null,mult:null,cyr:null,bc:null,pool:null,onsite:false,pb:false,rating:null,
 basis:"招标项目(截止4/17), 无任何披露, 无法评分. 'Premier'定位可能体量大. 需Tender Pack后才能评估",
 gaps:["要价: 招标定","全部收入: 未披露需Tender Pack","合同条款: 未知","套数: 未知","BC薪资: 未知"],
 url:"https://accomproperties.com.au/business-display/business-brisbane-city,19103",
 action:"获取Tender Pack; 截止4/17, 尽早准备"},
];

var F=9, K=["price","ni","mult","cyr","bc","pool","onsite","pb","rating"];
function comp(p){var c=0;K.forEach(function(k){if(p[k]!==null&&p[k]!==undefined)c++});return c}

function $(s){
  if(s===null||s===undefined) return '<span class="tn">N/A</span>';
  if(typeof s==="number") return '$'+s.toLocaleString();
  return String(s);
}
function st(n){
  if(n===null) return '无法评分';
  var s='';for(var i=0;i<5;i++) s+=i<Math.round(n)?'★':'☆';
  return s+' '+n.toFixed(1);
}
function bc(p){
  var c=comp(p), pct=Math.round((c/F)*100);
  return '<div class="pbar"><span class="lbl">数据完整度</span><div class="track"><div class="fill '+(pct>=67?'high':pct>=44?'med':'low')+'" style="width:'+pct+'%"></div></div><span class="val">'+c+'/'+F+' ('+pct+'%)</span></div>';
}

var h='', badges=['<span class="badge gold">🥇 #1</span>','<span class="badge silver">🥈 #2</span>','<span class="badge bronze">🥉 #3</span>','<span class="badge normal">#4</span>','<span class="badge normal">#5</span>','<span class="badge normal">#6</span>','<span class="badge hot">🔨 #7 Tender</span>'];
var th=['要价','净收入','倍数','合同','BC薪资','Pool'];
for(var i=0;i<P.length;i++){
  var p=P[i];
  h+='<div class="card"><div class="card-top">'+badges[i]+'<span class="ctitle">'+p.name+'</span><a class="clink" href="'+p.url+'" target="_blank">🔗 Listing</a></div>';
  h+='<div class="cprice">'+(p.price?'$'+p.price.toLocaleString():'🔨 招标 截止 Apr 17 4PM')+'</div>';
  h+=bc(p);
  h+='<div class="mg">';
  var vs=[
    {l:'要价',v:p.price?'$'+p.price.toLocaleString():'N/A',c:p.price?'vg':'vn'},
    {l:'净收入',v:p.ni?'$'+p.ni.toLocaleString():'N/A',c:p.ni?'vg':'vn'},
    {l:'倍数',v:p.mult?p.mult+'x':'N/A',c:p.mult?(p.mult>6?'vr':p.mult>5?'vy':'vg'):'vn'},
    {l:'合同',v:p.cyr?p.cyr+'年':'N/A',c:p.cyr?'vg':'vn'},
    {l:'BC薪资',v:p.bc?'$'+p.bc.toLocaleString():'N/A',c:p.bc?'vg':'vn'},
    {l:'Pool',v:p.pool?String(p.pool)+' units':'N/A',c:p.pool?'vb':'vn'},
  ];
  for(var j=0;j<vs.length;j++){
    h+='<div class="mc"><div class="v '+vs[j].c+'">'+vs[j].v+'</div><div class="l">'+vs[j].l+'</div></div>';
  }
  h+='</div>';
  h+='<div class="rrow"><span class="st">'+st(p.rating)+'</span></div>';
  h+='<div class="rbase">'+p.basis+'</div>';
  h+='<div class="gaps-d"><details><summary>❌ 缺失数据 ('+p.gaps.length+'项)</summary><ul>';
  for(var g=0;g<p.gaps.length;g++) h+='<li>'+p.gaps[g]+'</li>';
  h+='</ul></details></div>';
  h+='<div class="act"><div class="act-box"><b>→ 下一步:</b> '+p.action+'</div></div>';
  h+='</div>';
}
document.getElementById('cards').innerHTML=h;

/* Comparison table */
var tb='<tr><td><b>物业</b></td><td><b>要价 AUD</b></td><td><b>净收入</b></td><td><b>倍数</b></td><td><b>CYR</b></td><td><b>BC薪资</b></td><td><b>Pool</b></td><td><b>评分</b></td></tr>';
for(var i=0;i<P.length;i++){
  var p=P[i];
  tb+='<tr>';
  tb+='<td>'+p.name+'</td>';
  tb+='<td class="'+(p.price?'tg':'tn')+'">'+(p.price?'$'+p.price.toLocaleString():'N/A')+'</td>';
  tb+='<td class="'+(p.ni?'tg':'tn')+'">'+(p.ni?'$'+p.ni.toLocaleString():'N/A')+'</td>';
  tb+='<td class="'+(p.mult?(p.mult>6?'tr':p.mult>5?'ty':'tg'):'tn')+(p.mult?p.mult+'x':'N/A')+'</td>';
  tb+='<td class="'+(p.cyr?'tg':'tn')+'">'+(p.cyr?p.cyr+'年':'N/A')+'</td>';
  tb+='<td class="'+(p.bc?'tg':'tn')+'">'+(p.bc?'$'+p.bc.toLocaleString():'N/A')+'</td>';
  tb+='<td class="'+(p.pool?'tb':'tn')+'">'+(p.pool||'N/A')+'</td>';
  tb+='<td class="'+(p.rating!==null?(p.rating>=4?'tg':p.rating>=3.5?'ty':'tr'):'tn')+'">'+(p.rating!==null?p.rating.toFixed(1)+'/5.0':'N/A')+'</td>';
  tb+='</tr>';
}
document.getElementById('tbody').innerHTML=tb;
</script>
</body>
</html>
