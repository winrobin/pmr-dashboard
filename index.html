<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PMR V5 - Brisbane + Gold Coast</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#0a0b0f;color:#fff;font-family:-apple-system,sans-serif}
        .hd{background:#111827;padding:14px 10px;border-bottom:1px solid #1e2635;text-align:center}
        .hd h1{font-size:14px;margin:0 0 4px 0}
        .s{font-size:10px;color:#6b7b8d}
        .dt{font-size:9px;color:#4a9eff;margin-top:2px}
        .nb{padding:8px}
        .tl{font-size:12px;font-weight:bold;padding:12px 0 6px;border-bottom:1px solid #232d3d;margin-bottom:8px;margin-top:12px;color:#4a9eff}
        .c{background:#141922;border-radius:8px;margin-bottom:8px;border:1px solid #232d3d}
        .ch{display:flex;align-items:center;padding:8px;gap:6px}
        .rk{font-weight:bold;font-size:10px;padding:2px 5px;border-radius:7px;color:#fff}
        .r1{background:#f59e0b}.r2{background:#6b7b8d}.r3{background:#b45309}.r5{background:#ef4444}
        .nm{font-size:13px;font-weight:bold;flex:1}
        .lk{background:#1d4ed8;color:#fff;font-size:10px;padding:2px 4px;border-radius:3px;text-decoration:none}
        .pr{font-size:13px;color:#4a9eff;font-weight:bold;padding:2px 8px 0;text-align:center}
        .mg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 8px;margin-top:4px;margin-bottom:4px}
        .mi{background:#0e1117;border-radius:4px;padding:4px 2px;text-align:center}
        .mi .v{font-size:11px;font-weight:bold}
        .g{color:#22c55e}.y{color:#fbbf24}.r{color:#ef4444}.n{color:#4b5563}
        .mi .l{font-size:7px;color:#6b7b8d;text-transform:uppercase}
        .bx{font-size:10px;color:#aaa;background:#0e1117;padding:4px 8px;margin:4px;border-left:2px solid #f59e0b;line-height:1.3}
        .rw{font-size:9px;color:#f87171;padding:0 8px;margin-bottom:2px}
        .ab{font-size:10px;color:#c9d1d9;background:rgba(37,99,235,.1);border-left:2px solid #2563eb;padding:3px 8px;margin:4px 8px 0}
        .ab b{color:#60a5fa}
        .nw{font-size:8px;color:#22c55e;font-weight:bold;background:rgba(34,197,94,.1);padding:1px 4px;border-radius:3px;margin-left:4px}
        .gc{font-size:8px;color:#fbbf24;font-weight:bold;background:rgba(251,191,36,.1);padding:1px 4px;border-radius:3px;margin-left:4px}
        .ft{text-align:center;padding:12px 6px;color:#4b5563;font-size:9px}
        .tw{overflow-x:auto;padding-bottom:3px}
        .t{width:100%;border-collapse:collapse;font-size:9px;min-width:480px}
        .t th{background:#1a1f2e;padding:3px 1px;text-align:center;color:#666}
        .t td{padding:3px 1px;text-align:center;border-bottom:1px solid #191919}
        .t td:first-child{text-align:left;font-weight:600;color:#fff}
        .lang-toggle{position:fixed;top:10px;right:10px;background:#1d4ed8;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;z-index:1000}
        .lang-toggle:hover{background:#1e40af}
        .loading{text-align:center;padding:20px;color:#6b7b8d}
        .error{text-align:center;padding:20px;color:#ef4444}
    </style>
</head>
<body>
    <button class="lang-toggle" id="langToggle">中文</button>
    
    <div class="hd">
        <h1 id="title">PMR V5 - Brisbane + Gold Coast</h1>
        <div class="s" id="subtitle">2 Regions | 0 Properties | 0 GC total listings</div>
        <div class="dt" id="date">2026-04-12 20:19 AEST</div>
    </div>
    
    <div class="nb" id="propertyContainer">
        <!-- Property cards will be injected here by JavaScript -->
    </div>

    <script>
        // Language translations
        const translations = {
            en: {
                title: "PMR V5 - Brisbane + Gold Coast",
                subtitle: "2 Regions | {count} Properties | {gcCount} GC total listings",
                datePrefix: "Last updated: ",
                brisbane: "Brisbane",
                goldCoast: "Gold Coast",
                price: "Price",
                netInc: "Net Income",
                mult: "Multiplier",
                bc: "BC %",
                cont: "Contract Years",
                pool: "Pool Units",
                wkRent: "$/wk/unit",
                viewLink: "link",
                boxNote: "",
                actionPrompt: ">&gt;",
                footerText: "pmr-data-latest.json | {brCount} Bris + {gcCount} GC Properties | Gold Coast Market: {totalListings} total listings",
                toggleLang: "中文"
            },
            zh: {
                title: "PMR V5 - 布里斯班 + 黄金海岸",
                subtitle: "2 地区 | {count} 物业 | {gcCount} GC 总房源",
                datePrefix: "最后更新: ",
                brisbane: "布里斯班",
                goldCoast: "黄金海岸",
                price: "价格",
                netInc: "净收入",
                mult: "倍数",
                bc: "BC %",
                cont: "合同年限",
                pool: "泳池单位",
                wkRent: "$/周/单位",
                viewLink: "链接",
                boxNote: "",
                actionPrompt: ">&gt;",
                footerText: "pmr-data-latest.json | {brCount} 布里斯班 + {gcCount} 黄金海岸 物业 | 黄金海岸市场: {totalListings} 总房源",
                toggleLang: "English"
            }
        };

        let currentLang = 'en';
        let propertiesData = [];

        // Fetch data from JSON file
        async function fetchPropertyData() {
            try {
                const response = await fetch('pmr-data-latest.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                propertiesData = await response.json();
                renderProperties();
                updateStats();
            } catch (error) {
                console.error('Error fetching property data:', error);
                showError('Failed to load property data. Please try again later.');
            }
        }

        // Render property cards dynamically
        function renderProperties() {
            const container = document.getElementById('propertyContainer');
            container.innerHTML = ''; // Clear existing content
            
            if (propertiesData.length === 0) {
                showLoading('No property data available');
                return;
            }

            propertiesData.forEach((prop, index) => {
                const propertyCard = createPropertyCard(prop, index);
                container.appendChild(propertyCard);
            });
        }

        // Create individual property card
        function createPropertyCard(prop, index) {
            const card = document.createElement('div');
            card.className = 'c';
            card.innerHTML = `
                <div class="ch">
                    <span class="rk ${getRankClass(index + 1)}">${getRankNumber(index + 1)}</span>
                    <span class="nm">${prop.name}</span>
                    <a class="lk" href="${getPropertyUrl(prop.name)}" target="_blank">${t('viewLink')}</a>
                </div>
                <div class="pr">${formatCurrency(prop.price)}</div>
                <div class="mg">
                    <div class="mi"><div class="v ${getValueClass('price', prop.price)}">${formatCurrency(prop.price)}</div><div class="l">${t('price')}</div></div>
                    <div class="mi"><div class="v ${getValueClass('net_income', prop.net_income)}">${formatCurrency(prop.net_income || 0)}</div><div class="l">${t('netInc')}</div></div>
                    <div class="mi"><div class="v ${getValueClass('multiplier', prop.multiplier)}">${prop.multiplier?.toFixed(2) || 'N/A'}</div><div class="l">${t('mult')}</div></div>
                    <div class="mi"><div class="v ${getValueClass('contract_years', prop.contract_years)}">${prop.contract_years !== null ? prop.contract_years + 'yr' : 'N/A'}</div><div class="l">${t('cont')}</div></div>
                    <div class="mi"><div class="v ${getValueClass('bc_percent', prop.bc_percent)}">${prop.bc_percent !== null ? prop.bc_percent + '%' : 'N/A'}</div><div class="l">${t('bc')}</div></div>
                    <div class="mi"><div class="v ${getValueClass('weekly_rent_per_unit', prop.weekly_rent_per_unit)}">${prop.weekly_rent_per_unit !== null ? '$' + prop.weekly_rent_per_unit + '/wk' : 'N/A'}</div><div class="l">${t('wkRent')}</div></div>
                </div>
                <div class="bx">${getPropertyNotes(prop)}</div>
                <div class="ab"><b>${t('actionPrompt')}</b> ${getActionPrompt(prop)}</div>
            `;
            return card;
        }

        // Helper functions
        function getRankClass(rank) {
            if (rank === 1) return 'r1';
            if (rank === 2) return 'r2';
            if (rank === 3) return 'r3';
            return 'r5';
        }

        function getRankNumber(rank) {
            return rank;
        }

        function getValueClass(key, value) {
            if (value === null || value === undefined) return 'n';
            
            // Define thresholds for different metrics
            const thresholds = {
                price: { good: 1000000, great: 500000 }, // Lower is better
                net_income: { good: 150000, great: 250000 }, // Higher is better
                multiplier: { good: 6.0, great: 4.0 }, // Lower is better
                bc_percent: { good: 70, great: 60 }, // Lower is better (60-70% ideal)
                contract_years: { good: 10, great: 15 }, // Higher is better
                weekly_rent_per_unit: { good: 60, great: 80 } // Higher is better (60-85 normal range)
            };
            
            const thresh = thresholds[key];
            if (!thresh) return 'n';
            
            if (key === 'price' || key === 'multiplier' || key === 'bc_percent') {
                // Lower is better
                if (value <= thresh.great) return 'g';
                if (value <= thresh.good) return 'y';
                return 'r';
            } else {
                // Higher is better
                if (value >= thresh.great) return 'g';
                if (value >= thresh.good) return 'y';
                return 'r';
            }
        }

        function formatCurrency(amount) {
            if (amount === null || amount === undefined) return 'N/A';
            return '$' + amount.toLocaleString();
        }

        function getPropertyUrl(propertyName) {
            // Map property names to their known URLs
            const urlMap = {
                "The Gap": "https://accomproperties.com.au/business-display/business-the-gap,19190",
                "Brisbane CBD Waterfront": "https://accomproperties.com.au/business-display/business-brisbane-city,19147",
                "West End": "https://accomproperties.com.au/business-display/business-west-end,19008",
                "Mermaid Beach Premium": "https://accomproperties.com.au/business-display/business-mermaid-beach,18815",
                "Burleigh Waters": "https://accomproperties.com.au/business-display/business-burleigh-waters,19099",
                "Surfers Paradise Beachfront": "https://accomproperties.com.au/business-display/business-surfers-paradise,18237",
                "Silver Quays (Kangaroo Point)": "https://accomproperties.com.au/business-display/business-kangaroo-point,19211",
                "Main Beach Two Complex": "https://accomproperties.com.au/business-display/business-main-beach,19111",
                "Wakerley MR+Unit": "https://accomproperties.com.au/business-display/business-wakerley,19073",
                "Broadbeach Established": "https://accomproperties.com.au/business-display/business-broadbeach,18907"
            };
            return urlMap[propertyName] || "#";
        }

        function getPropertyNotes(prop) {
            return prop.notes || '';
        }

        function getActionPrompt(prop) {
            // Extract action prompt from notes or return default
            const notes = prop.notes || '';
            if (notes.includes('&gt;')) {
                const match = notes.match(/&gt;\s*([^<]+)/);
                return match ? match[1].trim() : 'Confirm details';
            }
            return 'Review property details';
        }

        function t(key) {
            return translations[currentLang][key] || key;
        }

        // Update statistics in footer and header
        function updateStats() {
            const brisbaneCount = propertiesData.filter(p => p.region === 'Brisbane').length;
            const goldCoastCount = propertiesData.filter(p => p.region === 'Gold Coast').length;
            const totalCount = propertiesData.length;
            
            // Update header stats
            document.getElementById('subtitle').textContent = 
                t('subtitle')
                    .replace('{count}', totalCount)
                    .replace('{gcCount}', goldCoastCount);
            
            document.getElementById('title').textContent = 
                currentLang === 'en' 
                    ? 'PMR V5 - Brisbane + Gold Coast' 
                    : 'PMR V5 - 布里斯班 + 黄金海岸';
            
            // Update date
            const dateStr = new Date().toLocaleString('en-AU', { 
                timeZone: 'Australia/Brisbane',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            }).replace(',', '') + ' AEST';
            document.getElementById('date').textContent = t('datePrefix') + dateStr;
            
            // Update footer
            const footerText = t('footerText')
                .replace('{brCount}', brisbaneCount)
                .replace('{gcCount}', goldCoastCount)
                .replace('{totalListings}', '191'); // Hardcoded as per original
            
            // Create or update footer
            let footer = document.querySelector('.ft');
            if (!footer) {
                footer = document.createElement('div');
                footer.className = 'ft';
                document.body.appendChild(footer);
            }
            footer.textContent = footerText;
            
            // Update language toggle button
            document.getElementById('langToggle').textContent = 
                currentLang === 'en' ? '中文' : 'English';
        }

        // Show loading state
        function showLoading(message) {
            const container = document.getElementById('propertyContainer');
            container.innerHTML = `<div class="loading">${message || 'Loading properties...'}</div>`;
        }

        // Show error state
        function showError(message) {
            const container = document.getElementById('propertyContainer');
            container.innerHTML = `<div class="error">${message || 'Error loading data'}</div>`;
        }

        // Language toggle functionality
        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateStats();
            renderProperties(); // Re-render with new language
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            showLoading('Loading property data...');
            fetchPropertyData();
        });
    </script>
</body>
</html>
